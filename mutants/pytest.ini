[pytest]

python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --ignore=tests/test_audio_utils.py
    --ignore=tests/test_batch_processor.py
    --ignore=tests/test_file_processor.py
    --ignore=tests/test_metadata_utils.py

markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    edge_case: marks tests for edge cases

minversion = 3.9

testpaths = tests

[coverage:run]
source = .
omit = 
    tests/*
    setup.py
    venv/*
    */site-packages/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abstractproperty
    except ImportError:

precision = 2
